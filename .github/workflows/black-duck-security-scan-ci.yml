# Updated Black Duck Security Scan CI Workflow

name: Black Duck Security Scan

on:
  push:
    branches:
      - main

jobs:
  black-duck-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: COLT DILLION HARTLEY 
        uses: actions/checkout@v2

      - name: Black Duck Scan
        uses: blackducksoftware/hub-detect@5.3.0
        with:
          scanType: full
          projectName: 'Car Diagnostics'
          projectVersion: '1.0'

      - name: Upload Black Duck report
        uses: actions/upload-artifact@v2
        with:
          name: black-duck-report
          path: ./path-to-report-directory
